services:
    nginx:
        image: nginx:1.27-alpine
        restart: unless-stopped
        ports:
            - "${NGINX_HTTP_PORT}:80"
        volumes:
            - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
            - ./:/var/www/html:ro
        depends_on:
            - php

    php:
        build:
            context: ./.docker/php
            args:
                USER_ID: ${USER_ID}
                GROUP_ID: ${GROUP_ID}
                COMPOSER_VERSION: ${COMPOSER_VERSION}
        restart: unless-stopped
        env_file:
            - .env
        volumes:
            - ./:/var/www/html
            - ./.docker/php/php.ini:/usr/local/etc/php/php.ini
        depends_on:
            - db
            - redis

    node:
        build:
            context: ./.docker/node
            args:
                USER_ID: ${USER_ID}
                GROUP_ID: ${GROUP_ID}
        restart: unless-stopped
        ports:
            - "${VITE_PUBLIC_PORT}:5173"
        volumes:
            - ./:/var/www/html

    db:
        build:
            context: ./.docker/postgres
            args:
                USER_ID: ${USER_ID}
                GROUP_ID: ${GROUP_ID}
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        ports:
            - "${DB_PUBLIC_PORT}:5432"
        volumes:
            - ./.docker/postgres/data:/var/lib/postgresql/data

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            - "${REDIS_PORT}:6379"
        volumes:
            - redis_data:/data

    queue:
        build:
            context: ./.docker/queue
            args:
                COMPOSER_VERSION: ${COMPOSER_VERSION}
        env_file:
            - .env
        volumes:
            - ./:/var/www/html
        command: php artisan queue:work --verbose --tries=3 --timeout=90
        restart: unless-stopped
        depends_on:
            - redis
            - php

    mailpit:
        image: axllent/mailpit:v1.27
        restart: unless-stopped
        ports:
            - "${MAILPIT_WEB_PORT}:8025"

volumes:
    redis_data:
        driver: local
